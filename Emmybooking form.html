<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Booking</title>
</head>
<body style="background-image: url(./photos/alexander-dummer-aS4Duj2j7r4-unsplash.jpg);" 
    class="object-cover w-full h-full font-sans text-white bg-no-repeat bg-cover ">
    <header>
        <nav class="sticky top-0 z-50 px-12 py-4 bg-black/30 backdrop-blur-md">
            
            <!-- Desktop Menu -->
            <div class="flex items-center justify-between text-base ">
                <div class="flex items-center gap-1">
                    <img src="photos/public-domain-vectors-m1UovLhQKR0-unsplash.jpg" alt="Photo logo" class="w-6 h-6 rounded-2xl">
                    <a href="" class="text-lg font-bold">Emmy<span class="text-amber-500/70">Photo</span></a>
                </div>
                
                <div class="items-center hidden gap-8 text-base md:flex">
                    <a href="index.html" class="px-4 py-2 font-medium transition-colors hover:text-amber-500 ">Home</a>
                    <a href="index.html" class="px-4 py-2 font-medium transition-colors hover:text-amber-500 ">About</a>
                    <a href="index.html" class="px-4 py-2 font-medium transition-colors hover:text-amber-500 ">Services</a>
                    <a href="index.html" class="px-4 py-2 font-medium transition-colors hover:text-amber-500 ">Contact</a>
                </div>

                
                <a href="#home" 
                class="hidden px-6 py-2.5 text-base font-semibold text-white rounded-xl bg-amber-600 hover:bg-amber-500 md:block transition-all duration-300">Book a Session</a>
            

                <!-- Menu Toggle -->
                
                <button id="menu-toggle"
                 class="text-3xl text-white md:hidden"
                 aria-label="Toggle menu">
                    <i class="fa-solid fa-bars"></i>
                </button>
                
            </div>

            <!-- Mobile View -->
            <div id="mobile-menu" 
                class="hidden py-6 mt-4 border-t border-white/10 bg-black/95 backdrop-blur-md md:hidden">
                <div class="flex flex-col items-center gap-6 px-4 py-2 text-lg ">
                    <a href="index.html" class="w-full px-3 py-2 font-medium rounded hover:bg-slate-300/20">Home</a>
                    <a href="index.html" class="w-full px-3 py-2 font-medium rounded hover:bg-slate-300/20">About</a>
                    <a href="index.html" class="w-full px-3 py-2 font-medium rounded hover:bg-slate-300/20">Services</a>
                    <a href="index.html" class="w-full px-3 py-2 font-medium rounded hover:bg-slate-300/20">Contact</a>
                    <a href="Emmybooking form.html" 
                        class="w-full px-8 py-3 mt-4 font-semibold text-center rounded-2xl bg-amber-600 hover:bg-amber-500">Book a Session
                    </a>
                </div>
            </div>

            
        
            
        </nav>
    </header>
    
    <div class="w-full h-screen border border-black bg-black/60">

    </div>

    <script>
        document.getElementById('menu-toggle').addEventListener('click', function(){
            const mobileMenu = document.getElementById('mobile-menu');
            mobileMenu.classList.toggle('hidden');
        })

        document.getElementsByClassName('fa-bars')[0].addEventListener('click', function(){
            if(this.classList.contains('fa-bars')){
                this.classList.replace('fa-bars', 'fa-xmark');
            }else{
                this.classList.replace('fa-xmark', 'fa-bars');
            }
        })
    </script>
</body>
</html>
